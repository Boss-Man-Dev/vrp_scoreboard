<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script src="nui://game/ui/jquery.js" type="text/javascript"></script>
	<script src="listener.js" type="text/javascript"></script>
	<link rel="stylesheet" href="nui://vrp_scoreboard/cfg/html/stylesheet.css"> 	<!-- css style for scoreboard -->
	<link href="https://fonts.googleapis.com/css?family=Roboto+Condensed" rel="stylesheet">
</head>
<body>
	<!-- js wrap handler -->
	<div style="display: none;" id="wrap">
		
		<!-- header info and title is handled by the config.js -->
		<div class="header">
			<div id="title">
				<h1></h1>
			</div>
		</div>
		
		<!-- get emojis at https://emojipedia.org/ -->
		<!-- primary jobs -->
		<div class="jobs" id="job">
			<div class="job_text" style="color:red;"> EMS: <span id="ems">0</span></div>
			<div class="job_text" style="color:#5ea1e0;"> Police: <span id="police">0</span></div>
			<div class="job_text" style="color:yellow;"> Taxi: <span id="taxi">0</span></div>
			<div class="job_text" style="color:grey;"> Mechanic: <span id="mechanic">0</span></div>
		</div>
		
		<!-- extra/other jobs seperatte line -->
		<div class="jobs_extra" style="display: none;" id="extra">
			<div class="extra_text" style="color:lightblue;"> Dealership: <span id="cardealer">0</span></div>
			<div class="extra_text" style="color:#58ce93;"> Estate: <span id="estate">0</span></div>
		</div>

		<div class="catagories" id="cats">
			<div class="c_text" style="color:white;"> Name</div>
			<div class="c_text" style="color:white;"> Job</div>
			<div class="c_text" style="color:white;"> Phone</div>
		</div>
		<!-- table for players -->
		<table id="ptbl" width="100%">
		</table>
			
		<!-- bottom bar and items -->
		<div class="bottom">
			<!--left text info -->
			<div id="special">
				<div class="s_text" style="color:#f100ff;"> Owner: <span id="owner">0</span></div>
				<div class="s_text" style="color:#ff8800;"> Admin: <span id="admin">0</span></div>
				<div class="s_text" style="color:#00ff85;"> Mod: <span id="mod">0</span></div>
			</div>
			<!--discord link -->
			<div id="footer">
				<h2></h2>
			</div>
		</div>
		<script src="nui://vrp_scoreboard/cfg/html/config.js"></script>
	</div>
</body>
</html>
